name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Create .env
        run: |
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "VITE_API_PROXY=false" >> .env

      - name: Build Web App
        run: npm run build

      - name: Sync Android
        run: npx cap sync android

      - name: Remove corrupt Gradle wrapper
        run: rm -rf android/gradle/wrapper/gradle-wrapper.jar android/gradlew android/gradlew.bat

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Android APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: txan-agent-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
