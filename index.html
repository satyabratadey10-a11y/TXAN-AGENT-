<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0c0c0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="description" content="TXAN Agent Workspace" />
    <title>TXAN Agent Environment</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || (e.message && e.message.includes('Script error'))) {
          e.preventDefault();
          e.stopImmediatePropagation();
        }
      }, true);
      window.onerror = function(msg) {
        if (msg === 'Script error.' || (msg && msg.toString().includes('Script error'))) {
          return true;
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
